<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./css/styles.css">
  <title>Frontend Mentor | Social links profile</title>
</head>

<body>
  <main class="main__container">
    <section class="main__card">
      <div class="main__profile">
        <div class="main__picture">
          <img class="main__img" src="./assets/images/avatar-jessica.jpeg" alt="imagen_perfil_usuario">
        </div>
        <div class="main__data">
          <h1 class="main__name">Jessica Randall</h1>
          <h3 class="main__address">London, United Kingdom</h3>
        </div>
        <div>
          <p class="main__text">"Front-end developer and avid reader."</p>
        </div>
      </div>
      <div class="main__buttons">
        <ul class="main__links">
          <li class="main__link">GitHub</li>
          <li class="main__link">Frontend Mentor</li>
          <li class="main__link">LinkedIn</li>
          <li class="main__link">Twitter</li>
          <li class="main__link">Instagram</li>
        </ul>
      </div>
    </section>
  </main>
</body>

</html>
